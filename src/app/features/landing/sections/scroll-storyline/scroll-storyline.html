<div
  data-storyline-track
  class="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 pointer-events-none z-0 hidden lg:block"
  [style.width.px]="2"
>
  <svg
    class="absolute inset-0 w-full h-full overflow-visible"
    preserveAspectRatio="none"
    viewBox="0 0 2 100"
  >
    <line
      x1="1"
      y1="0"
      x2="1"
      y2="100"
      stroke="rgba(255,255,255,0.04)"
      stroke-width="2"
      vector-effect="non-scaling-stroke"
    />

    <line
      x1="1"
      y1="0"
      x2="1"
      y2="100"
      stroke="url(#lineGrad)"
      stroke-width="2"
      vector-effect="non-scaling-stroke"
      stroke-linecap="round"
      [attr.stroke-dasharray]="100"
      [attr.stroke-dashoffset]="pathDashOffset()"
    />

    <defs>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f97316" stop-opacity="0" />
        <stop offset="40%" stop-color="#f97316" stop-opacity="1" />
        <stop offset="100%" stop-color="#f97316" stop-opacity="0.3" />
      </linearGradient>
    </defs>
  </svg>

  <div class="absolute left-1/2 -translate-x-1/2 w-3 h-3" [style.top]="dotTop()">
    <div class="absolute inset-0 rounded-full bg-orange-500/30 blur-md scale-[3]"></div>
    <div
      class="absolute inset-0 rounded-full bg-orange-500 shadow-[0_0_12px_4px_rgba(249,115,22,0.6)]"
    ></div>
  </div>
</div>
