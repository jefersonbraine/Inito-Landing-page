<section
  id="hero"
  class="hero relative min-h-screen flex items-center overflow-hidden pt-20 text-white"
>
  <div class="absolute inset-0 bg-[#080a0f]"></div>

  <div
    class="absolute inset-0 flex items-center justify-end pr-8 lg:pr-16 pointer-events-none select-none overflow-hidden"
    aria-hidden="true"
  >
    <span class="hero-brand text-[18vw] font-black text-white/4 leading-none tracking-tighter"
      >INITO</span
    >
  </div>

  <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
    <div
      class="absolute top-1/2 right-1/3 -translate-y-1/2 w-175 h-175 bg-orange-500/10 rounded-full blur-[130px]"
    ></div>
    <div
      class="absolute top-1/2 right-1/4 -translate-y-1/2 w-75 h-75 bg-orange-600/15 rounded-full blur-[60px]"
    ></div>
  </div>

  <div
    class="hero-grid absolute inset-0 opacity-[0.025] pointer-events-none"
    aria-hidden="true"
  ></div>

  <div class="relative z-10 w-full max-w-7xl mx-auto px-6 lg:px-8">
    <div
      class="flex flex-col lg:flex-row items-center justify-between gap-12 lg:gap-0 min-h-[80vh]"
    >
      <div class="flex-1 max-w-xl">
        <p class="hero-fade-up text-xs font-semibold tracking-[0.3em] uppercase text-gray-500 mb-6">
          INICIANDO.DEV - BOT SERIES
        </p>

        <h1
          class="hero-fade-up text-5xl sm:text-6xl lg:text-7xl font-black leading-none tracking-tight text-white mb-6"
          style="animation-delay: 80ms"
        >
          INITO
        </h1>

        <p
          class="hero-fade-up text-lg text-gray-400 mb-8 leading-snug max-w-xs"
          style="animation-delay: 140ms"
        >
          Inteligência para moderar,
          <br />
          <span class="text-white">empatia para ensinar.</span>
        </p>

        <div class="hero-fade-up flex flex-col sm:flex-row gap-3" style="animation-delay: 220ms">
          <a
            href="https://discord.com/invite/H8dBaQTECH" target="_blank"
            class="group inline-flex items-center justify-center px-8 py-4 bg-orange-500 hover:bg-orange-600 text-white text-base font-semibold shadow-lg shadow-orange-500/30 transition-all duration-300 rounded-md"
          >
            Participar da Comunidade
            <span class="ml-2 transition-transform duration-300 group-hover:translate-x-1"
              >-&gt;</span
            >
          </a>

          <a
            href="https://github.com/jefersonbraine/Inito-Landing-page/wiki" target="_blank"
            class="inline-flex items-center justify-center px-8 py-4 text-base border border-white/15 bg-transparent hover:bg-white/5 text-gray-300 hover:text-white transition-all rounded-md"
          >
            Documentação
          </a>
        </div>
      </div>

      <div class="flex-1 flex items-center justify-center lg:justify-end relative">
        <div
          class="absolute w-125 h-125 bg-linear-to-br from-orange-500/5 to-transparent rounded-full blur-2xl"
          aria-hidden="true"
        ></div>

        <div class="hero-fade-right relative z-10 logo-host" style="animation-delay: 120ms">
          <app-inito-logo3d [size]="380" />
        </div>
      </div>
    </div>

    <div class="hero-fade-up border-t border-white/5 pt-8 pb-4 mt-4" style="animation-delay: 320ms">
      <div class="w-full max-w-4xl mx-auto flex flex-col sm:flex-row sm:items-start sm:justify-between gap-8 sm:gap-12">
        @for (stat of stats(); track stat.label) {
          <div class="flex-1 text-center">
            <p class="text-xl font-bold text-white">{{ stat.value }}</p>
            <p class="text-xs text-gray-600 mt-1 uppercase tracking-wider">{{ stat.label }}</p>
          </div>
        }
      </div>
    </div>
  </div>
</section>
