name: Bug
description: Reporte um problema
title: "fix: "
labels:
  - type:bug
  - area:core
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Descricao do bug
      description: O que esta acontecendo de forma incorreta?
      placeholder: Descreva o comportamento observado.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
      placeholder: Descreva o comportamento correto.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Como reproduzir o problema?
      placeholder: |
        1. Va para ...
        2. Clique em ...
        3. Veja o erro ...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidencias
      description: Logs, prints, stacktrace ou links relevantes.
      placeholder: Cole os detalhes aqui.

  - type: textarea
    id: scope
    attributes:
      label: Escopo afetado
      description: Modulos, telas ou componentes impactados.
      placeholder: ex.: landing, footer, CI, testes

  - type: checkboxes
    id: checks
    attributes:
      label: Validacoes
      options:
        - label: Verifiquei se ja existe issue semelhante
          required: true
        - label: Inclui evidencias para facilitar a analise
          required: false
